<!-- fragments/subject-item.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="subject-item(subject)">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="flex items-start">
                <div
                    class="w-16 h-16 rounded-lg bg-gradient-to-r from-upm-blue to-upm-light-blue flex items-center justify-center mr-4">
                    <i class="fas fa-laptop-code text-white text-2xl"></i>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-xl font-bold text-upm-blue" th:text="${subject.name}">Nombre Asignatura</h3>
                        </div>
                    </div>

                    <div class="mt-3 mb-4">
                        <span th:each="attribute : ${subject.attributes}"
                            class="inline-block bg-upm-gray rounded-full px-3 py-1 text-sm font-medium mr-2"
                            th:text="${attribute}">Attribute</span>
                    </div>

                    <p class="text-gray-700 mb-4" th:text="${subject.description}">Descripción de la asignatura.</p>

                    <div class="flex justify-between items-center">
                        <div>
                        </div>
                        <a th:href="@{'/subject/' + ${subject.id}}"
                            class="text-upm-light-blue hover:text-upm-blue font-medium">
                            Ver detalles →
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
