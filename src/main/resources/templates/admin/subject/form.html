<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${subject.id != null} ? 'Editar Asignatura' : 'Nueva Asignatura'">Subject Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 th:text="${subject.id != null} ? 'Editar Asignatura' : 'Nueva Asignatura'">Subject Form</h1>
    <form th:action="@{${actionUrl}}" th:object="${subject}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label">Nombre</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Descripción</label>
            <input type="text" id="description" th:field="*{description}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label for="credits" class="form-label">Créditos</label>
            <input type="number" id="credits" th:field="*{credits}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label for="semester" class="form-label">Semestre</label>
            <select id="semester" th:field="*{semesters}" class="form-select" required>
                <option th:each="sem : ${semesters}" th:value="${sem}" th:text="${sem}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="languages" class="form-label">Idiomas</label>
            <select id="languages" th:field="*{languages}" multiple class="form-select" required>
                <option th:each="lang : ${languages}" th:value="${lang}" th:text="${lang}"></option>
            </select>
            <small class="form-text text-muted">Usa Ctrl (o Cmd en Mac) para seleccionar varios.</small>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" th:href="@{/admin/subject}">Cancelar</a>
    </form>
</div>
</body>
</html>
