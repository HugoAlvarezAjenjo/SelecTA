<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Panel del Profesor</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/hero.css}">
        <link rel="stylesheet" th:href="@{/css/card.css}">
    </th:block>
</head>
<body>
<main layout:fragment="content">

    <section class="hero-pattern py-8">
        <div class="container mx-auto px-4">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h1 class="text-3xl md:text-4xl font-bold text-upm-blue mb-1">
                    <i class="fas fa-chalkboard-teacher mr-3"></i>Panel del Profesor
                </h1>
                <p class="text-gray-600">
                    Bienvenido, <span class="font-medium" th:text="${teacherName}">Profesor</span> — gestiona tus asignaturas
                </p>
            </div>
        </div>
    </section>

    <section class="py-8 bg-upm-gray bg-opacity-30 min-h-screen">
        <div class="container mx-auto px-4">
            <h2 class="text-xl font-bold text-upm-blue mb-6 flex items-center gap-2">
                <i class="fas fa-book"></i> Mis Asignaturas
            </h2>

            <div th:if="${#sets.isEmpty(subjects)}" class="bg-white rounded-xl shadow-sm p-12 text-center">
                <div class="w-20 h-20 rounded-full bg-upm-light-blue bg-opacity-10 flex items-center justify-center mx-auto mb-5">
                    <i class="fas fa-book-open text-upm-light-blue text-3xl"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-700 mb-2">No tienes asignaturas asignadas</h3>
                <p class="text-gray-500">Contacta con el administrador para que te asigne asignaturas.</p>
            </div>

            <div th:unless="${#sets.isEmpty(subjects)}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <a th:each="subject : ${subjects}"
                   th:href="@{'/teacher/subject/' + ${subject.id}}"
                   class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-lg transition-all group block">
                    <div class="flex items-start gap-4 mb-4">
                        <div class="w-14 h-14 rounded-xl bg-upm-light-blue bg-opacity-10 flex items-center justify-center flex-shrink-0 group-hover:bg-opacity-20 transition-all">
                            <i class="fas fa-book text-upm-light-blue text-xl"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="text-lg font-bold text-upm-blue group-hover:text-upm-light-blue transition-colors truncate" th:text="${subject.name}">Asignatura</h3>
                            <p class="text-sm text-gray-500" th:text="${subject.credits} + ' créditos'">6 créditos</p>
                        </div>
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-2 mb-4" th:text="${subject.description}">Descripción de la asignatura...</p>
                    <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                        <span class="text-sm text-upm-light-blue font-medium group-hover:text-upm-blue">
                            Gestionar recursos <i class="fas fa-arrow-right ml-1"></i>
                        </span>
                    </div>
                </a>
            </div>
        </div>
    </section>

</main>
</body>
</html>
