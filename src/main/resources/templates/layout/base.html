<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | SelecTA">SelecTA</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:src="@{/js/tailwind-config.js}"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Base styles (shared across all pages) -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/accessibility.css}">

    <!-- Additional page-specific styles injected here -->
    <th:block layout:fragment="styles"></th:block>
</head>
<body class="font-sans bg-white text-gray-800">

    <!-- Skip to content link for keyboard/screen reader users -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[100] focus:bg-upm-blue focus:text-white focus:px-4 focus:py-2 focus:rounded-lg focus:font-medium">
        Saltar al contenido principal
    </a>

    <!-- Navbar -->
    <th:block th:replace="~{fragments/navbar :: navbar}" />

    <!-- Page content -->
    <main id="main-content" layout:fragment="content" tabindex="-1">
        <p>Page content goes here</p>
    </main>

    <!-- Footer -->
    <th:block th:replace="~{fragments/footer :: footer}" />

    <!-- ARIA Live region for dynamic announcements (screen readers) -->
    <div id="aria-live-announcer" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <!-- Additional page-specific scripts injected here -->
    <th:block layout:fragment="scripts"></th:block>

    <!-- Global accessibility utilities -->
    <script th:src="@{/js/accessibility.js}"></script>
</body>
</html>
