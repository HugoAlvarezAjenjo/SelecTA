spring.application.name=SelecTA

spring.datasource.url=jdbc:h2:file:~/h2/selecta;AUTO_SERVER=TRUE
spring.h2.console.enabled=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Feature flags
feature.filterList.enabled=false

# File upload limits (50MB max — covers videos, presentations, large PDFs)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# OpenAPI / Swagger UI
springdoc.packages-to-scan=es.hugoalvarezajenjo.selecta.controllers
springdoc.paths-to-match=/api/**
