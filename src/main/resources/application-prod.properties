spring.application.name=SelecTA

# PostgreSQL production database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:selecta}
spring.datasource.username=${DB_USERNAME:selecta}
spring.datasource.password=${DB_PASSWORD:selecta}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# SQL initialization (disabled in prod — schema managed by Hibernate ddl-auto)
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Disable Swagger UI in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Feature flags
feature.filterList.enabled=false
