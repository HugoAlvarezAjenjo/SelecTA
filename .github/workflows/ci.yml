# ──────────────────────────────────────────────────────────────────────
# CI Pipeline - SelecTA
# ──────────────────────────────────────────────────────────────────────
# Triggers: push to main, pull requests to main
# Steps: Build → Test → JaCoCo Coverage → SonarCloud Analysis
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for SonarCloud blame

      # ─── Java Setup ─────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ─── Build & Test ───────────────────────────────────────────────
      - name: Build and run tests
        run: ./mvnw -B verify

      # ─── SonarCloud Analysis ────────────────────────────────────────
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=HugoAlvarezAjenjo_SelecTA
          -Dsonar.organization=hugoalvarezajenjo
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # ─── Upload Test Reports ────────────────────────────────────────
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/surefire-reports/
          retention-days: 14
