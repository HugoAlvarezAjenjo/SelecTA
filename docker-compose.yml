services:
  db:
    image: postgres:16-alpine
    container_name: selecta-db
    environment:
      POSTGRES_DB: selecta
      POSTGRES_USER: selecta
      POSTGRES_PASSWORD: selecta
    ports:
      - "5432:5432"
    volumes:
      - selecta-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selecta"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: selecta-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: selecta
      DB_USERNAME: selecta
      DB_PASSWORD: selecta
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - selecta-uploads:/app/uploads

volumes:
  selecta-data:
  selecta-uploads:
